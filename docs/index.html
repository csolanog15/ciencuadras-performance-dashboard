<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ciencuadras Performance Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Montserrat',sans-serif}.metric-good{color:#16a34a}.metric-needs-improvement{color:#d97706}.metric-poor{color:#dc2626}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-gradient-to-r from-[#253150] to-[#3e98cc] text-white py-6 shadow-lg">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-3xl font-bold">Ciencuadras Performance Dashboard</h1>
      <p class="text-blue-100 mt-1">Core Web Vitals &mdash; Monitoreo automatizado</p>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex gap-4 mb-8 flex-wrap">
      <select id="strategyFilter" class="border rounded-lg px-4 py-2 bg-white shadow-sm"><option value="all">Todas</option><option value="mobile">Mobile</option><option value="desktop">Desktop</option></select>
      <select id="pageFilter" class="border rounded-lg px-4 py-2 bg-white shadow-sm"><option value="all">Todas</option><option value="Home">Home</option><option value="Arriendo">Arriendo</option><option value="Venta">Venta</option></select>
      <span id="lastUpdate" class="ml-auto text-sm text-gray-500 self-center"></span>
    </div>
    <div id="scoreCards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
      <div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-lg mb-4">Performance Score</h3><canvas id="scoreChart"></canvas></div>
      <div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-lg mb-4">LCP (ms)</h3><canvas id="lcpChart"></canvas></div>
      <div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-lg mb-4">CLS</h3><canvas id="clsChart"></canvas></div>
      <div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-lg mb-4">TBT (ms)</h3><canvas id="tbtChart"></canvas></div>
    </div>
    <div class="bg-white rounded-xl shadow p-6"><h3 class="font-bold text-lg mb-4">Ultimos Resultados</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">Pagina</th><th class="px-4 py-3">Device</th><th class="px-4 py-3">Score</th><th class="px-4 py-3">LCP</th><th class="px-4 py-3">CLS</th><th class="px-4 py-3">TBT</th><th class="px-4 py-3">FCP</th></tr></thead><tbody id="resultsTable"></tbody></table></div></div>
  </main>
  <footer class="text-center py-6 text-gray-400 text-sm">Actualizado 2x/dia via GitHub Actions + PageSpeed Insights API</footer>
  <script>
  let allData=[],charts={};
  function gc(s){return s>=90?'metric-good':s>=50?'metric-needs-improvement':'metric-poor'}
  function gb(s){return s>=90?'bg-green-50 border-green-200':s>=50?'bg-amber-50 border-amber-200':'bg-red-50 border-red-200'}
  function renderCards(){const l=allData[allData.length-1];if(!l||!l.results)return;document.getElementById('scoreCards').innerHTML=l.results.filter(r=>r.score!==null).map(r=>`<div class="border rounded-xl p-6 ${gb(r.score)}"><div class="flex justify-between"><div><p class="text-sm font-medium text-gray-600">${r.page}</p><p class="text-xs text-gray-400">${r.strategy}</p></div><span class="text-3xl font-bold ${gc(r.score)}">${r.score}</span></div><div class="mt-4 grid grid-cols-2 gap-2 text-xs"><div>LCP: <b>${r.lcp}</b></div><div>CLS: <b>${r.cls}</b></div><div>TBT: <b>${r.tbt}</b></div><div>FCP: <b>${r.fcp}</b></div></div></div>`).join('')}
  function renderTable(){const l=allData[allData.length-1];if(!l||!l.results)return;document.getElementById('resultsTable').innerHTML=l.results.filter(r=>r.score!==null).map(r=>`<tr class="border-t"><td class="px-4 py-3">${r.page}</td><td class="px-4 py-3 text-center">${r.strategy}</td><td class="px-4 py-3 text-center ${gc(r.score)}"><b>${r.score}</b></td><td class="px-4 py-3 text-center">${r.lcp}</td><td class="px-4 py-3 text-center">${r.cls}</td><td class="px-4 py-3 text-center">${r.tbt}</td><td class="px-4 py-3 text-center">${r.fcp}</td></tr>`).join('')}
  function renderCharts(){const labels=allData.map(d=>d.date),pages=['Home','Arriendo','Venta'],colors={Home:'#3e98cc',Arriendo:'#253150',Venta:'#bd0f14'},s=document.getElementById('strategyFilter').value==='all'?'mobile':document.getElementById('strategyFilter').value;function ds(m){return pages.map(p=>({label:p,data:allData.map(d=>{const r=(d.results||[]).find(x=>x.page===p&&x.strategy===s);return r?r[m]:null}),borderColor:colors[p],tension:.3,fill:false}))}if(charts.s)charts.s.destroy();charts.s=new Chart(document.getElementById('scoreChart'),{type:'line',data:{labels,datasets:ds('score')},options:{responsive:true,scales:{y:{min:0,max:100}}}});if(charts.l)charts.l.destroy();charts.l=new Chart(document.getElementById('lcpChart'),{type:'line',data:{labels,datasets:ds('lcpMs')},options:{responsive:true}});if(charts.c)charts.c.destroy();charts.c=new Chart(document.getElementById('clsChart'),{type:'line',data:{labels,datasets:ds('clsNum')},options:{responsive:true}});if(charts.t)charts.t.destroy();charts.t=new Chart(document.getElementById('tbtChart'),{type:'line',data:{labels,datasets:ds('tbtMs')},options:{responsive:true}})}
  function render(){renderCards();renderTable();renderCharts();const l=allData[allData.length-1];if(l)document.getElementById('lastUpdate').textContent='Ultima: '+l.date+' '+l.session}
  document.getElementById('strategyFilter').addEventListener('change',render);
  document.getElementById('pageFilter').addEventListener('change',render);
  fetch('data.json').then(r=>r.json()).then(d=>{allData=Array.isArray(d)?d:[d];render()}).catch(e=>console.error(e));
  </script>
</body>
</html>
